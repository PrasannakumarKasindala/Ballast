name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev extras; zero runtime deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check ballast tests benchmark

      - name: Test
        run: pytest

      - name: Smoke-test the demo (plants skew, so exit 1 is the correct answer)
        run: |
          ballast demo; rc=$?
          if [ "$rc" -ne 1 ]; then echo "expected exit 1 (skew planted), got $rc"; exit 1; fi
